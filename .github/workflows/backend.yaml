name: CI for Backend (Flask/Python)

# Forces GitHub Actions to use Node 24 to prevent deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ------------------------------------------------------------------------------
# TRIGGERS: When does this workflow run?
# Keeps the backend pipeline synchronized with the frontend release cycle.
# ------------------------------------------------------------------------------
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # --------------------------------------------------------------------------
    # ENVIRONMENT: What operating system runs this test?
    # --------------------------------------------------------------------------
    runs-on: ubuntu-latest

    defaults:
      run:
        # All commands below will execute inside the 'backend' folder
        working-directory: ./backend

    steps:
      # Step 1: Pull the repository code into the virtual runner
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Set up the Python environment
      # Python 3.14
      - name: Set up Python 3.14.3

        uses: actions/setup-python@v4
        with:
          python-version: '3.14.3'
          cache: 'pip' # Speeds up workflow by caching downloaded pip packages

      # Step 3: Upgrade pip and install the project's exact requirements
      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8  # Installed specifically for CI code quality checks

      # Step 4: Code Quality Check
      # Flake8 scans the Python files for syntax errors or undefined names.
      # - select=E9,F63,F7,F82: Targets catastrophic errors that break execution.
      - name: Enforce Python Code Quality (Linting)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # Step 5: Server Startup Verification
      # This is a critical integration test. It attempts to start the Flask server.
      # If there is a circular import or a missing package, this step will crash and fail the workflow.
      - name: Verify Flask Server Startup
        env:
          # Injects the secret API key from GitHub Secrets into the virtual environment

          # Database Configuration (Supabase PostgreSQL)
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          
          # External APIs
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          FINANCE_DATA_KEY: ${{ secrets.FINANCE_DATA_KEY }}
        run: |
          echo "Attempting to start Flask server..."
          # Start the server in the background using '&'
          python app.py &
          # Capture the Process ID (PID) of the Flask server
          APP_PID=$!
          
          # Wait for 7 seconds to give Flask time to boot and potentially crash
          sleep 7
          
          # Check if the process is still running. If not, it crashed.
          if ps -p $APP_PID > /dev/null
          then
             echo "Flask server successfully started and is stable."
             # Cleanly kill the background process to end the test
             kill $APP_PID
          else
             echo "Flask server crashed during startup."
             exit 1
          fi
